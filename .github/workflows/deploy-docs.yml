name: Deploy docs

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "astro.config.mjs"
      - "src/content.config.js"
      - "src/content/**"
      - "src/styles/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check Pages configuration
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}; skipping docs deployment."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Configure Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Setup Node
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.pages.outputs.enabled == 'true'
        run: npm ci

      - name: Build docs
        if: steps.pages.outputs.enabled == 'true'
        run: npm run docs:build

      - name: Upload Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy docs to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
